name: Deploy to itch.io

on:
  push:
    branches: [ master ]
    paths:
      - 'itch-page/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Package & publish to itch.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install butler (itch.io CLI)
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Verify itch-page exists
        run: ls -la itch-page/

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push itch-page/ ${{ secrets.ITCHIO_USERNAME }}/${{ secrets.ITCHIO_GAME }}:web --userversion-file VERSION || \
          ./butler push itch-page/ ${{ secrets.ITCHIO_USERNAME }}/${{ secrets.ITCHIO_GAME }}:web

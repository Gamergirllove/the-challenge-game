<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge.io</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f5c518;
      --cyan: #00e5ff;
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --red: #e8192c;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: #e2e8f0;
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      padding: 28px 20px 0;
      text-align: center;
      position: relative;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 200px at 50% 0%, rgba(245,197,24,0.1) 0%, transparent 100%);
      pointer-events: none;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold), #fff 60%, var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(245,197,24,0.35));
      line-height: 1;
    }

    .logo-sub {
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-top: 6px;
      margin-bottom: 28px;
    }

    /* ── PLAY BUTTON ── */
    .play-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px;
      width: 100%;
      max-width: 480px;
    }

    .btn-play {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #c98a00);
      color: #000;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: 3px;
      padding: 20px;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 40px rgba(245,197,24,0.5), 0 4px 20px rgba(0,0,0,0.5);
      animation: pulse 2.5s ease-in-out infinite;
    }
    .btn-play:hover {
      transform: scale(1.03);
      box-shadow: 0 0 60px rgba(245,197,24,0.8);
      animation: none;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 40px rgba(245,197,24,0.5), 0 4px 20px rgba(0,0,0,0.5); }
      50%      { box-shadow: 0 0 70px rgba(245,197,24,0.85), 0 4px 20px rgba(0,0,0,0.5); }
    }

    .launch-note {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .countdown-line {
      font-size: 0.8rem;
      color: #334155;
    }

    .countdown-line span { color: var(--gold); font-weight: 700; }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      max-width: 600px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 20px 0;
    }

    /* ── LEADERBOARD ── */
    .lb-section {
      width: 100%;
      max-width: 600px;
      padding: 0 20px 60px;
    }

    .lb-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 16px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .lb-row:hover { border-color: rgba(245,197,24,0.3); }

    .lb-row.top1 { border-color: #ffd700; background: linear-gradient(90deg, rgba(255,215,0,0.08), var(--card)); }
    .lb-row.top2 { border-color: #c0c0c0; background: linear-gradient(90deg, rgba(192,192,192,0.06), var(--card)); }
    .lb-row.top3 { border-color: #cd7f32; background: linear-gradient(90deg, rgba(205,127,50,0.06), var(--card)); }

    .lb-rank {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      width: 28px;
      text-align: center;
    }
    .lb-row.top1 .lb-rank { color: #ffd700; }
    .lb-row.top2 .lb-rank { color: #c0c0c0; }
    .lb-row.top3 .lb-rank { color: #cd7f32; }

    .lb-shirt { width: 36px; height: 36px; flex-shrink: 0; }

    .lb-name {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .lb-wins {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      color: var(--gold);
    }

    .lb-games {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
    }

    .lb-empty {
      text-align: center;
      color: var(--muted);
      padding: 32px;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .lb-loading {
      text-align: center;
      color: var(--muted);
      padding: 24px;
      font-size: 0.85rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">CHALLENGE.IO</div>
    <div class="logo-sub">Multiplayer &bull; Social Deduction &bull; 20 Mini-Games</div>
  </header>

  <!-- PLAY -->
  <div class="play-section">
    <a class="btn-play" id="play-btn" href="https://talented-benevolence-production-5242.up.railway.app" target="_blank" rel="noopener">
      ▶ PLAY NOW
    </a>
    <div class="launch-note">Free to play &bull; No download &bull; Up to 10 players</div>
    <div class="launch-note" style="font-size:0.75rem;color:#334155;">Opens in a new tab</div>
  </div>

  <div class="divider"></div>

  <!-- LEADERBOARD -->
  <div class="lb-section">
    <div class="lb-title">🏆 HALL OF CHAMPIONS</div>
    <div id="lb-list"><div class="lb-loading">LOADING…</div></div>
  </div>

  <script>
    const GAME_URL = 'https://talented-benevolence-production-5242.up.railway.app';

    // Shirt SVG
    function shirtSVG(wins) {
      const tiers = [
        { min:0,  max:0,  fill:'#64748b', stroke:'#94a3b8' },
        { min:1,  max:2,  fill:'#7c4a1e', stroke:'#cd7f32' },
        { min:3,  max:4,  fill:'#6b7280', stroke:'#c0c0c0' },
        { min:5,  max:9,  fill:'#92610a', stroke:'#ffd700' },
        { min:10, max:999,fill:'url(#cg)', stroke:'#f5c518' },
      ];
      const tier = tiers.find(t => wins >= t.min && wins <= t.max) || tiers[0];
      const star = wins >= 10 ? `<text x="50" y="68" text-anchor="middle" font-size="18" fill="#f5c518">★</text>` : `<text x="50" y="68" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)" font-family="sans-serif">${wins}</text>`;
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f5c518"/><stop offset="100%" stop-color="#fff7a0"/></linearGradient></defs>
        <path d="M18,3 L26,15 Q37,20 50,22 Q63,20 74,15 L82,3 L100,22 L78,34 L78,98 L22,98 L22,34 L0,22 Z" fill="${tier.fill}" stroke="${tier.stroke}" stroke-width="2"/>
        ${star}
      </svg>`;
    }

    // Leaderboard
    async function loadLeaderboard() {
      const list = document.getElementById('lb-list');
      try {
        const res = await fetch(GAME_URL + '/api/leaderboard');
        const data = await res.json();
        if (!data.length) { list.innerHTML = '<div class="lb-empty">NO CHAMPIONS YET — BE THE FIRST</div>'; return; }
        list.innerHTML = data.map((p, i) => {
          const cls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
          const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
          return `<div class="lb-row ${cls}">
            <div class="lb-rank">${medal}</div>
            <div class="lb-shirt">${shirtSVG(p.wins)}</div>
            <div class="lb-name">${p.name}</div>
            <div class="lb-wins">${p.wins} WIN${p.wins !== 1 ? 'S' : ''}</div>
            <div class="lb-games">${p.totalGames} games</div>
          </div>`;
        }).join('');
      } catch {
        list.innerHTML = '<div class="lb-empty">LEADERBOARD UNAVAILABLE</div>';
      }
    }

    loadLeaderboard();
  </script>
</body>
</html>
